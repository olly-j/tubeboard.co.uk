app = 'tubeboard-co-uk'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  SITE_DIR = '.'
  LIVE_ACTIVITY_DATA_FILE = '/data/live-activities.json'
  LIVE_ACTIVITY_WORKER_ENABLED = 'true'
  LIVE_ACTIVITY_WORKER_INTERVAL_MS = '90000'
  LIVE_ACTIVITY_MAX_ACTIVE_HOURS = '8'
  LIVE_ACTIVITY_RETENTION_HOURS = '24'
  APNS_BUNDLE_ID = 'OllyJ.My-Train-Times'

[[mounts]]
  source = 'tubeboard_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
